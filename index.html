<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frege | Cardápio</title>
    <meta name="description" content="Cardápio digital do Frege." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="hero" id="inicio">
      <img
        class="hero__art hero__art--cup"
        src="./assets/crops/cup.png"
        alt=""
        aria-hidden="true"
      />
      <img
        class="hero__art hero__art--branch"
        src="./assets/crops/branch.png"
        alt=""
        aria-hidden="true"
      />

      <div class="hero__content">
        <img
          class="hero__logo"
          src="./assets/logo-white-hq.png"
          alt="Logo do Frege"
        />
        <a class="hero__cta" href="#prato-do-dia">Ver cardápio</a>
      </div>
    </header>

    <nav class="section-nav" aria-label="Seções do cardápio">
      <div class="section-nav__row">
        <a class="section-nav__link" href="#prato-do-dia">Prato do dia</a>
        <a class="section-nav__link" href="#entradas">Entradas</a>
        <a class="section-nav__link" href="#almoco-principal">Almoço</a>
        <a class="section-nav__link" href="#executivo">Executivo</a>
        <a class="section-nav__link" href="#bebidas">Bebidas</a>
        <a class="section-nav__link" href="#classicos">Clássicos</a>
        <a class="section-nav__link" href="#destilados">Destilados</a>
        <a class="section-nav__link" href="#vinhos">Vinhos</a>
      </div>
    </nav>

    <main>
      <section class="menu-section menu-section--featured" id="prato-do-dia">
        <div class="section-heading">
          <div>
            <span class="section-heading__eyebrow">Atualizado automaticamente</span>
            <h2 class="section-heading__title ornament-title">
              <span class="ornament-title__text">Prato do dia</span>
            </h2>
          </div>
        </div>

        <div class="featured-panel">
          <div class="featured-panel__status" id="featured-status"></div>
          <div class="featured-panel__row">
            <div class="featured-panel__main">
              <h3 class="featured-panel__title" id="featured-dish"></h3>
              <p class="featured-panel__hours" id="featured-hours"></p>
              <p class="featured-panel__description" id="featured-description"></p>
            </div>
            <div class="featured-panel__aside">
              <div class="featured-meta">
                <span class="featured-meta__label">Suco do dia</span>
                <strong class="featured-meta__value" id="featured-juice"></strong>
              </div>
              <div class="featured-meta">
                <span class="featured-meta__label">Preço</span>
                <strong class="featured-meta__value">R$ 29,90</strong>
              </div>
            </div>
          </div>
          <p class="featured-panel__note" id="featured-note"></p>
        </div>

        <div class="week-strip" id="week-strip"></div>
      </section>

      <div id="menu-sections"></div>
    </main>

    <footer class="footer">
      <img class="footer__logo" src="./assets/logo-white.png" alt="Frege" />
    </footer>

    <script src="./menu-data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
